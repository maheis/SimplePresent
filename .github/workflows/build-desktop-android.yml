name: CI - Build Desktop & Android

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
    linux:
        name: Build Linux
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "stable"
            - name: Install Linux deps
              run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev libfontconfig1-dev libx11-dev
            - name: Flutter pub get
              run: flutter pub get
            - name: Build Linux release
              run: flutter build linux --release
            - name: Upload Linux artifact
              uses: actions/upload-artifact@v4
              with:
                  name: simplepresent-linux
                  path: build/linux/runner/release/bundle

    windows:
        name: Build Windows
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "stable"
            - name: Flutter pub get
              run: flutter pub get
            - name: Build Windows release
              run: flutter build windows --release
            - name: Upload Windows artifact
              uses: actions/upload-artifact@v4
              with:
                  name: simplepresent-windows
                  path: build/windows/runner/Release/**

    android:
        name: Build Android APK
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "stable"
            - name: Accept Android licenses
              run: |
                  yes | flutter doctor --android-licenses || true
            - name: Flutter pub get
              run: flutter pub get
            - name: Build Android release APK
              run: flutter build apk --release
            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: simplepresent-android-apk
                  path: build/app/outputs/flutter-apk/app-release.apk
