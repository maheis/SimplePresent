name: CI - Build Desktop & Android

on:
    release:
        types: [published]
    workflow_dispatch: {}

jobs:
    linux:
        name: Build Linux
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
            - name: Install Linux deps
              run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev libfontconfig1-dev libx11-dev
            - name: Flutter pub get
              run: flutter pub get
            - name: Build Linux release
              run: flutter build linux --release
            - name: Package Linux bundle
              run: |
                  mkdir -p release_dist
                  echo "Listing build directories for diagnostics"
                  ls -la build || true
                  ls -la build/linux || true
                  ls -la build/linux/runner/release || true
                  if [ -d build/linux/runner/release/bundle ]; then
                    tar -czf release_dist/simplepresent-linux.tar.gz -C build/linux/runner/release/bundle .
                  else
                    echo "ERROR: build output not found: build/linux/runner/release/bundle"
                    ls -la build/linux/runner/release || true
                    exit 1
                  fi
            - name: Upload Linux artifact
              uses: actions/upload-artifact@v4
              with:
                  name: simplepresent-linux
                  path: release_dist/simplepresent-linux.tar.gz
            - name: Upload Linux artifact to Release
              uses: actions/upload-release-asset@v1
              with:
                  upload_url: ${{ github.event.release.upload_url }}
                  asset_path: release_dist/simplepresent-linux.tar.gz
                  asset_name: simplepresent-linux.tar.gz
                  asset_content_type: application/gzip

    windows:
        name: Build Windows
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
            - name: Flutter pub get
              run: flutter pub get
            - name: Build Windows release
              run: flutter build windows --release
            - name: Package Windows bundle
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path release_dist | Out-Null
                  $src = 'build/windows/runner/Release'
                  Write-Host "Listing build directories for diagnostics"
                  Get-ChildItem -Force build -ErrorAction SilentlyContinue | Select-Object -First 50
                  if (Test-Path $src) {
                    Compress-Archive -Path "${src}\*" -DestinationPath "release_dist\simplepresent-windows.zip" -Force
                  } else {
                    Write-Host "ERROR: build output not found: $src"
                    Get-ChildItem -Path build -Recurse -Force -ErrorAction SilentlyContinue | Select-Object -First 200
                    exit 1
                  }
            - name: Upload Windows artifact
              uses: actions/upload-artifact@v4
              with:
                  name: simplepresent-windows
                  path: release_dist/simplepresent-windows.zip
            - name: Upload Windows artifact to Release
              uses: actions/upload-release-asset@v1
              with:
                  upload_url: ${{ github.event.release.upload_url }}
                  asset_path: release_dist/simplepresent-windows.zip
                  asset_name: simplepresent-windows.zip
                  asset_content_type: application/zip

