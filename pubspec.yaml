name: simple_present
description: A minimal Flutter starter for the SimplePresent project.
publish_to: "none"
version: 0.0.1
environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  path_provider: ^2.0.11
  intl: ^0.19.0
  flutter_svg: ^1.1.1
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.10.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sounds/
  fonts:
    - family: Ubuntu
      fonts:
        - asset: assets/fonts/Ubuntu-Regular.ttf
        - asset: assets/fonts/Ubuntu-Bold.ttf
          weight: 700

flutter_icons:
  android: true
  ios: false
  image_path: assets/icons/icon.png
  adaptive_icon_background: assets/icons/icon.png
  adaptive_icon_foreground: assets/icons/icon.png
